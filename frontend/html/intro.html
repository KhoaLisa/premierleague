<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#070a14" />
    <title>Intro • Premier League</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/frontend/css/intro.css" />
  </head>

  <body class="intro">
    <div class="introBg" aria-hidden="true">
      <video
        class="introVid"
        id="introVid"
        autoplay
        muted
        playsinline
        preload="auto"
      >
        <source src="/frontend/video/nha.mp4" type="video/mp4" />
      </video>
      <div class="introOverlay"></div>
      <div class="introGrain"></div>
    </div>

    <main class="introMain">
      <div class="badge">OFFICIAL LAUNCH</div>

      <h1 class="title" id="title">
        <span class="t1">WELCOME</span>
        <span class="t2">TO PREMIER LEAGUE</span>
      </h1>

      <p class="sub" id="sub">Loading match hub, teams, stats…</p>

      <div class="barWrap" aria-hidden="true">
        <div class="bar" id="bar"></div>
      </div>
    </main>

    <!-- ✅ LUÔN HIỆN TRÊN VIDEO -->
    <button class="skip" id="skip" type="button">Skip ↵</button>

    <button class="soundBtn" id="soundBtn" type="button">🔇 Sound: Off</button>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="/frontend/js/intro.js"></script>
  </body>
</html>
